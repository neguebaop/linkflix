<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ content.title }} - Linkflix</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="watch-body">

<div class="watch-topbar">
  <a href="{{ url_for('home') }}" class="watch-back">← Voltar</a>

  <div class="watch-title-wrap">
    <div class="watch-title">{{ content.title }}</div>
    <div class="watch-sub">
      {{ content.content_type }}{% if content.category %} • {{ content.category }}{% endif %}
    </div>
  </div>
</div>

<div class="watch-wrap">

  <!-- ================= PLAYER ================= -->
  <div class="watch-player">

    {% if not is_series %}
      <!-- 🎬 FILME -->
      <iframe
        src="https://playerflixapi.com/filme/{{ content.tmdb_id }}"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        allowfullscreen>
      </iframe>

    {% else %}
      <!-- 📺 SÉRIE -->
      <iframe
        id="seriesFrame"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        allowfullscreen>
      </iframe>

      <div style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;">
        <div>
          <label>Temporada</label><br>
          <select id="seasonSelect"></select>
        </div>

        <div>
          <label>Episódio</label><br>
          <select id="episodeSelect"></select>
        </div>
      </div>
    {% endif %}

  </div>

  <!-- ================= INFO ================= -->
  <div class="watch-info">

    {% if content.description %}
      <p class="watch-desc">{{ content.description }}</p>
    {% endif %}

    <div class="watch-progress-card">
      <div class="watch-progress-top">
        <span>Progresso</span>
        <span id="pctText">0%</span>
      </div>

      <div class="watch-progress-bar">
        <span id="pctBar" style="width:0%"></span>
      </div>

      <div class="watch-progress-actions">
        <button class="btn-ghost" onclick="setProgress(0)">Recomeçar</button>
        <button class="btn-ghost" onclick="setProgress(25)">25%</button>
        <button class="btn-ghost" onclick="setProgress(50)">50%</button>
        <button class="btn-ghost" onclick="setProgress(75)">75%</button>
        <button class="btn-primary" onclick="setProgress(95)">Quase no fim</button>
      </div>
    </div>

  </div>
</div>

<script>
const contentId = {{ content.id }};
const updateUrl = `/progress/update/${contentId}`;
let currentPct = {{ progress_pct|default(0) }};

function paint(pct){
  currentPct = Math.max(0, Math.min(100, pct));
  document.getElementById("pctText").innerText = currentPct + "%";
  document.getElementById("pctBar").style.width = currentPct + "%";
}

async function sendProgressPercent(pct){
  await fetch(updateUrl,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ position:pct, duration:100 })
  });
}

function setProgress(pct){
  paint(pct);
  sendProgressPercent(pct);
}

paint(currentPct);

{% if is_series %}

const TMDB_ID = "{{ content.tmdb_id }}";
const seasonSelect = document.getElementById("seasonSelect");
const episodeSelect = document.getElementById("episodeSelect");
const frame = document.getElementById("seriesFrame");

// Carregar temporadas
fetch(`/api/tmdb/tv/${TMDB_ID}/seasons`)
.then(res => res.json())
.then(data => {

  const seasons = data.seasons || [];

  seasons.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s.season_number;
    opt.textContent = s.name;
    seasonSelect.appendChild(opt);
  });

  loadEpisodes(seasons[0].season_number);
});

// Carregar episódios
function loadEpisodes(seasonNumber){
  fetch(`/api/tmdb/tv/${TMDB_ID}/season/${seasonNumber}`)
  .then(res => res.json())
  .then(data => {

    episodeSelect.innerHTML = "";

    const eps = data.episodes || [];

    eps.forEach(ep => {
      const opt = document.createElement("option");
      opt.value = ep.episode_number;
      opt.textContent = ep.episode_number + " - " + ep.name;
      episodeSelect.appendChild(opt);
    });

    loadPlayer(seasonNumber, eps[0].episode_number);
  });
}

function loadPlayer(season, episode){
  frame.src = `https://playerflixapi.com/serie/${TMDB_ID}/${season}/${episode}`;
}

seasonSelect.addEventListener("change", ()=>{
  loadEpisodes(seasonSelect.value);
});

episodeSelect.addEventListener("change", ()=>{
  loadPlayer(seasonSelect.value, episodeSelect.value);
});

{% endif %}
</script>

</body>
</html>
