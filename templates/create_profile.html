<!DOCTYPE html>
<html>
<head>
    <title>Criar Perfil - LinkFlix</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #141414;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background-color: rgba(0,0,0,0.85);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            width: 350px;
            box-shadow: 0 0 25px rgba(255,0,0,0.3);
        }
        h1 {
            color: #e50914;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            background-color: #222;
            color: white;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            background-color: #333;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #e50914;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #ff1a1a;
            transform: scale(1.03);
        }
        .error {
            color: #ff4c4c;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .link {
            margin-top: 15px;
            font-size: 14px;
            color: #bbb;
        }
        .link a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Criar Perfil</h1>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="name" placeholder="Nome do Perfil" required>
        <input type="url" name="avatar" placeholder="URL do Avatar (opcional)">
        <button type="submit">Criar Perfil</button>
    </form>

    <div class="link">
        <a href="/select_profile">Voltar para Seleção de Perfis</a>
    </div>
</div>

</body>
</html>
