<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{% block title %}Linkflix{% endblock %}</title>

  <!-- PWA -->
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Ícone (fallback) -->
  <link rel="icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">

  <!-- CSS principal do seu site -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- Mensagens flash (opcional, mas recomendado) -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrapper">
        {% for category, message in messages %}
          <div class="flash flash-{{ category|e }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

  <!-- Service Worker (PWA) -->
  <script>
    (function () {
      if (!("serviceWorker" in navigator)) return;

      window.addEventListener("load", function () {
        navigator.serviceWorker.register("{{ url_for('static', filename='service-worker.js') }}")
          .catch(function (err) {
            console.log("SW register failed:", err);
          });
      });
    })();
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
