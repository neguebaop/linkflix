<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Selecionar Perfil - LinkFlix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FontAwesome (ícones do lápis) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #141414;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 80px;
      font-size: 50px;
      font-weight: 500;
    }

    .profiles-container {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-top: 60px;
      flex-wrap: wrap;
      padding: 0 14px;
    }

    .profile-card {
      width: 180px;
      cursor: pointer;
      transition: transform 0.3s ease;
      position: relative; /* ✅ pra posicionar lápis e check */
      text-decoration: none;
      color: white;
      display: inline-block;
    }

    .profile-card img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      border: 4px solid transparent;
      transition: 0.3s ease;
      display:block;
    }

    .profile-name {
      margin-top: 15px;
      font-size: 18px;
      color: #b3b3b3;
      transition: 0.3s ease;
    }

    .profile-card:hover {
      transform: scale(1.12);
    }

    .profile-card:hover img {
      border-color: white;
    }

    .profile-card:hover .profile-name {
      color: white;
    }

    /* ✅ Lápis (editar) estilo Netflix */
    .edit-badge{
      position:absolute;
      left: 12px;
      bottom: 54px; /* fica em cima do canto do avatar */
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.18);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      text-decoration:none;
      opacity: 0;
      transform: translateY(6px);
      transition: .22s ease;
      z-index: 3;
    }
    .profile-card:hover .edit-badge{
      opacity: 1;
      transform: translateY(0);
    }
    .edit-badge:hover{
      background: rgba(0,0,0,0.86);
      border-color: rgba(255,255,255,0.28);
    }

    /* ✅ Check do perfil ativo */
    .active-check{
      position:absolute;
      right: 12px;
      bottom: 54px;
      min-width: 32px;
      height: 32px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(229,9,20,0.92);
      border: 1px solid rgba(255,255,255,0.22);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 900;
      font-size: 14px;
      color:#fff;
      z-index: 3;
    }

    /* Adicionar perfil */
    .add-profile {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .add-icon {
      width: 180px;
      height: 180px;
      border: 4px dashed #555;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 70px;
      color: #777;
      transition: 0.3s ease;
      box-sizing: border-box;
    }

    .add-profile:hover .add-icon {
      border-color: white;
      color: white;
    }

    /* Botão Gerenciar */
    .manage-btn {
      display: inline-block;
      margin-top: 80px;
      padding: 12px 35px;
      border: 1px solid #777;
      color: #777;
      text-decoration: none;
      font-size: 16px;
      transition: 0.3s ease;
      border-radius: 2px;
    }

    .manage-btn:hover {
      border-color: white;
      color: white;
    }

    /* Responsivo */
    @media (max-width: 768px) {
      h1 { font-size: 32px; }

      .profile-card { width: 130px; }

      .profile-card img,
      .add-icon {
        width: 130px;
        height: 130px;
      }

      .profiles-container { gap: 30px; }

      .edit-badge{
        left: 10px;
        bottom: 46px;
        width: 34px;
        height: 34px;
      }

      .active-check{
        right: 10px;
        bottom: 46px;
        height: 30px;
        min-width: 30px;
      }
    }
  </style>
</head>

<body>

<h1>Quem está assistindo?</h1>

<div class="profiles-container">

  {% for profile in profiles %}
    <div class="profile-card" onclick="window.location.href='{{ url_for('select_profile', profile_id=profile.id) }}'">

      <!-- ✅ lápis (editar) -->
      <a class="edit-badge"
         href="{{ url_for('edit_profile', profile_id=profile.id) }}"
         onclick="event.stopPropagation();"
         title="Editar perfil"
         aria-label="Editar perfil">
        <i class="fa-solid fa-pencil"></i>
      </a>

      <!-- ✅ check do perfil ativo -->
      {% if session.get('active_profile') and session.get('active_profile') == profile.id %}
        <div class="active-check">✓</div>
      {% endif %}

      <img
        src="{% if profile.avatar %}{{ profile.avatar }}{% else %}{{ url_for('static', filename='images/default_profile.png') }}{% endif %}"
        onerror="this.onerror=null; this.src='{{ url_for('static', filename='images/default_profile.png') }}';"
        alt="{{ profile.name }}"
      >
      <div class="profile-name">{{ profile.name }}</div>
    </div>
  {% endfor %}

  {% if profiles|length < 5 %}
    <div class="profile-card add-profile" onclick="window.location.href='{{ url_for('create_profile') }}'">
      <div class="add-icon">+</div>
      <div class="profile-name">Adicionar</div>
    </div>
  {% endif %}

</div>

<a href="{{ url_for('manage_profiles') }}" class="manage-btn">Gerenciar perfis</a>

</body>
</html>
