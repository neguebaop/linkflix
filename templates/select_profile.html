<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Selecionar Perfil - LinkFlix</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #141414;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 80px;
            font-size: 50px;
            font-weight: 500;
        }

        .profiles-container {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .profile-card {
            width: 180px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .profile-card img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            border: 4px solid transparent;
            transition: 0.3s ease;
        }

        .profile-name {
            margin-top: 15px;
            font-size: 18px;
            color: #b3b3b3;
            transition: 0.3s ease;
        }

        .profile-card:hover {
            transform: scale(1.12);
        }

        .profile-card:hover img {
            border-color: white;
        }

        .profile-card:hover .profile-name {
            color: white;
        }

        /* Adicionar perfil */
        .add-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .add-icon {
            width: 180px;
            height: 180px;
            border: 4px dashed #555;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            color: #777;
            transition: 0.3s ease;
        }

        .add-profile:hover .add-icon {
            border-color: white;
            color: white;
        }

        /* Botão Gerenciar */
        .manage-btn {
            display: inline-block;
            margin-top: 80px;
            padding: 12px 35px;
            border: 1px solid #777;
            color: #777;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s ease;
        }

        .manage-btn:hover {
            border-color: white;
            color: white;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            .profile-card,
            .add-icon {
                width: 130px;
            }

            .profile-card img,
            .add-icon {
                width: 130px;
                height: 130px;
            }

            .profiles-container {
                gap: 30px;
            }
        }
    </style>
</head>
<body>

<h1>Quem está assistindo?</h1>

<div class="profiles-container">

    {% for profile in profiles %}
    <div class="profile-card" onclick="window.location.href='/profile/{{ profile.id }}'">
        <img src="{{ profile.avatar }}" alt="{{ profile.name }}">
        <div class="profile-name">{{ profile.name }}</div>
    </div>
    {% endfor %}

    {% if profiles|length < 5 %}
    <div class="profile-card add-profile" onclick="window.location.href='/create_profile'">
        <div class="add-icon">+</div>
        <div class="profile-name">Adicionar</div>
    </div>
    {% endif %}

</div>

<a href="{{ url_for('manage_profiles') }}" class="manage-btn">Gerenciar perfis</a>

</body>
</html>
