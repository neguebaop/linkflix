<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Linkflix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar">
  <div class="nav-left">
    <a class="logo" href="{{ url_for('home') }}">LINKFLIX</a>

    <div class="nav-links">
      <a href="{{ url_for('home') }}">Início</a>
      <a href="{{ url_for('filmes_page') }}">Filmes</a>
      <a href="{{ url_for('series_page') }}">Séries</a>
      <a href="{{ url_for('embreve_page') }}">Em Breve</a>
    </div>
  </div>

  <div class="nav-right">

    <!-- ✅ SEARCH WRAP (Netflix-like no mobile) -->
    <div class="search-wrap">
      <!-- botão lupa (mobile) -->
      <button class="search-toggle" type="button" aria-label="Abrir pesquisa">
        <i class="fa fa-search"></i>
      </button>

      <!-- form real -->
      <form method="GET" action="{{ url_for('home') }}" class="search-form" role="search">
        <i class="fa fa-search"></i>
        <input
          id="navSearchInput"
          type="text"
          name="search"
          placeholder="Títulos, gêneros"
          value="{{ request.args.get('search', '') }}"
          aria-label="Pesquisar títulos e gêneros"
        >
        <button class="search-close" type="button" aria-label="Fechar pesquisa">
          <i class="fa fa-times"></i>
        </button>
      </form>
    </div>

    <i class="fa-regular fa-bell nav-icon" aria-label="Notificações"></i>

    <div class="profile-dropdown">
      <button class="profile-button" type="button" aria-label="Menu de perfil">
        <img
          src="{% if active_profile and active_profile.avatar %}{{ active_profile.avatar }}{% else %}{{ url_for('static', filename='images/default_profile.png') }}{% endif %}"
          class="profile-pic"
          alt="Perfil"
          onerror="this.onerror=null;this.src='{{ url_for('static', filename='images/default_profile.png') }}';"
        >
        <i class="fa fa-caret-down"></i>
      </button>

      <div class="profile-menu">
        <a href="{{ url_for('account') }}">Minha Conta</a>
        <a href="{{ url_for('select_profile_page') }}">Trocar Perfil</a>
        <a href="{{ url_for('create_profile') }}">Adicionar Perfil</a>

        {% if active_profile %}
          <a href="{{ url_for('edit_profile', profile_id=active_profile.id) }}">Editar Perfil</a>
        {% endif %}

        <a href="{{ url_for('admin') }}">Admin</a>
        <a href="{{ url_for('logout') }}">Sair</a>
      </div>
    </div>
  </div>
</nav>

<div class="main-content">
  {% block content %}{% endblock %}
</div>

<!-- ✅ JS: abre/fecha pesquisa no mobile -->
<script>
  (function(){
    const navbar = document.querySelector('.navbar');
    const toggle = document.querySelector('.search-toggle');
    const closeBtn = document.querySelector('.search-close');
    const input = document.querySelector('#navSearchInput');
    const form = document.querySelector('.search-form');

    if(!navbar || !toggle || !closeBtn || !input || !form) return;

    function openSearch(){
      navbar.classList.add('search-open');
      setTimeout(() => input.focus(), 50);
    }

    function closeSearch(){
      navbar.classList.remove('search-open');
      input.blur();
    }

    toggle.addEventListener('click', (e) => { e.preventDefault(); openSearch(); });
    closeBtn.addEventListener('click', (e) => { e.preventDefault(); closeSearch(); });

    // ✅ se clicar no input e estiver no mobile, garante aberto
    input.addEventListener('click', () => {
      if (window.innerWidth <= 768) navbar.classList.add('search-open');
    });

    document.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') closeSearch();
    });
  })();
</script>

<!-- ✅ INTRO LINKFLIX estilo Netflix (SÓ NO /login) -->
{% if request.endpoint == 'login' %}
<div id="lfx-intro" style="
  position:fixed; inset:0; z-index:999999;
  display:flex; align-items:center; justify-content:center;
  background:#000;
">
  <div id="lfx-wrap" style="
    position:relative;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  ">
    <!-- Texto principal -->
    <div id="lfx-logo" style="
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      letter-spacing: 6px;
      font-size: 72px;
      color: #E50914;
      text-transform: uppercase;

      opacity: 0;
      transform: scale(0.86);
      filter: drop-shadow(0 0 0 rgba(229,9,20,0));
      transition: opacity 520ms ease, transform 520ms ease, filter 520ms ease;
      user-select:none;
    ">LINKFLIX</div>

    <!-- Shine (luz passando) -->
    <div id="lfx-shine" style="
      position:absolute;
      width: 120%;
      height: 120%;
      left:-10%;
      top:-10%;
      pointer-events:none;
      opacity:0;
      background: linear-gradient(115deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0.65) 50%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0) 100%
      );
      transform: translateX(-60%) skewX(-18deg);
      transition: opacity 200ms ease;
      mix-blend-mode: screen;
    "></div>

    <!-- Vinheta/Glow sutil -->
    <div id="lfx-vignette" style="
      position:fixed; inset:0; pointer-events:none;
      background: radial-gradient(circle at center,
        rgba(229,9,20,0.10) 0%,
        rgba(0,0,0,0.0) 35%,
        rgba(0,0,0,0.65) 72%,
        rgba(0,0,0,0.92) 100%
      );
      opacity:0;
      transition: opacity 520ms ease;
    "></div>
  </div>
</div>

<script>
(function(){
  // ✅ roda 1 vez por sessão (pra não repetir sempre)
  const KEY = "lfx_intro_seen_v1";
  if (sessionStorage.getItem(KEY) === "1") {
    const el = document.getElementById("lfx-intro");
    if (el) el.remove();
    return;
  }
  sessionStorage.setItem(KEY, "1");

  const intro = document.getElementById("lfx-intro");
  const logo  = document.getElementById("lfx-logo");
  const shine = document.getElementById("lfx-shine");
  const vig   = document.getElementById("lfx-vignette");
  if (!intro || !logo || !shine || !vig) return;

  // evita scroll “piscando”
  const oldOverflow = document.documentElement.style.overflow;
  document.documentElement.style.overflow = "hidden";

  // 1) Entrada: aparece + zoom
  requestAnimationFrame(() => {
    vig.style.opacity = "1";
    logo.style.opacity = "1";
    logo.style.transform = "scale(1)";
    logo.style.filter = "drop-shadow(0 0 22px rgba(229,9,20,0.25))";
  });

  // 2) Shine passa por cima
  setTimeout(() => {
    shine.style.opacity = "0.95";
    shine.style.transition = "opacity 140ms ease";
    shine.style.transform = "translateX(70%) skewX(-18deg)";
    shine.style.transition = "transform 720ms ease, opacity 180ms ease";
  }, 450);

  setTimeout(() => {
    shine.style.opacity = "0";
  }, 1200);

  // 3) “pulsinho” final bem sutil
  setTimeout(() => {
    logo.style.transform = "scale(1.03)";
    logo.style.filter = "drop-shadow(0 0 32px rgba(229,9,20,0.30))";
  }, 1150);

  // 4) Fade out
  setTimeout(() => {
    logo.style.opacity = "0";
    vig.style.opacity = "0";
    intro.style.opacity = "0";
    intro.style.transition = "opacity 420ms ease";
  }, 1600);

  // 5) Remove overlay
  setTimeout(() => {
    intro.remove();
    document.documentElement.style.overflow = oldOverflow;
  }, 2100);
})();
</script>
{% endif %}
<!-- /INTRO -->

</body>
</html>
